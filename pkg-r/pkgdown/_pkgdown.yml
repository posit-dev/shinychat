url: https://posit-dev.github.io/shinychat/r

destination: "../docs/r"

development:
  mode: auto

authors:
  Posit Software, PBC:
    href: https://www.posit.co
    html: >-
      <img src='https://www.tidyverse.org/posit-logo.svg' alt='Posit' height='16' width='62' style="margin-bottom: 3px;" />
  Carson Sievert:
    href: https://cpsievert.me
  Garrick Aden-Buie:
    href: https://garrickadenbuie.com

template:
  bootstrap: 5
  light-switch: true
  theme: github-light
  theme-dark: github-dark
  includes:
    in_header: |
      <!-- Privacy-friendly analytics by Plausible -->
      <script async src="https://plausible.io/js/pa-wYY8PsN7VIq_v1gETXZt9.js"></script>
      <script>
        window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
        plausible.init()
      </script>
  bslib:
    brand: pkgdown/_brand.yml

navbar:
  structure:
    left:  [get-started, articles, reference]
    right: [search, news, github, lightswitch]
  components:
    home: ~

    get-started:
      text: Get Started
      href: articles/get-started.html

    articles:
      text: Articles
      menu:
      - text: Tool Calling UI
        href: articles/tool-ui.html

reference:
- title: Chat interfaces
  contents:
  - chat_ui
  - chat_app
  - chat_append
  - chat_append_message
  - chat_clear
  - update_chat_user_input

- title: Streaming markdown interface
  contents:
  - markdown_stream
  - output_markdown_stream

- title: Bookmark chat history
  contents:
  - chat_restore

- title: Integration with ellmer
  contents:
  - contents_shinychat

news:
  releases:
  - text: "v0.4.0"
    href: https://github.com/posit-dev/shinychat/releases/tag/r/v0.4.0
  - text: "v0.3.0"
    href: https://shiny.posit.co/blog/posts/shinychat-tool-ui/
